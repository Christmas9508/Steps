          w("app/src/main/java/com/example/stepbooster/MainViewModel.kt", """
          package com.example.stepbooster

          import android.app.Application
          import android.content.Intent
          import androidx.lifecycle.AndroidViewModel
          import androidx.lifecycle.viewModelScope
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.flow.MutableStateFlow
          import kotlinx.coroutines.flow.StateFlow
          import kotlinx.coroutines.flow.asStateFlow
          import kotlinx.coroutines.flow.combine
          import kotlinx.coroutines.launch

          data class AppState(
              val isServiceRunning: Boolean = false,
              val multiplier: Float = 2.0f,
              val simMode: String = "SENSOR",
              val stepsPerMin: Int = 90,
              val gpsSimEnabled: Boolean = false,
              val realStepsToday: Long = 0L,
              val simStepsToday: Long = 0L,
              val boostedStepsToday: Long = 0L,
              val healthConnectAvailable: Boolean = false,
              val hasPermissions: Boolean = false
          )

          class MainViewModel(application: Application) : AndroidViewModel(application) {
              private val ctx = application.applicationContext
              private val hcMgr = HealthConnectManager(ctx)
              private val _state = MutableStateFlow(AppState())
              val state: StateFlow<AppState> = _state.asStateFlow()

              init {
                  viewModelScope.launch {
                      combine(
                          AppDataStore.getMultiplier(ctx),
                          AppDataStore.getSimMode(ctx),
                          AppDataStore.getStepsPerMin(ctx),
                          AppDataStore.getGpsSim(ctx)
                      ) { mult, mode, spm, gps ->
                          _state.value.copy(
                              multiplier = mult,
                              simMode = mode,
                              stepsPerMin = spm,
                              gpsSimEnabled = gps
                          )
                      }.collect {
                          _state.value = it
                      }
                  }

                  viewModelScope.launch {
                      while (true) {
                          delay(1000)
                          val avail = hcMgr.isAvailable()
                          _state.value = _state.value.copy(
                              isServiceRunning = StepBoosterService.isRunning,
                              realStepsToday = StepBoosterService.realStepsToday,
                              simStepsToday = StepBoosterService.simStepsToday,
                              boostedStepsToday = StepBoosterService.boostedStepsToday,
                              healthConnectAvailable = avail,
                              hasPermissions = if (avail) hcMgr.hasPermissions() else false
                          )
                      }
                  }
              }

              fun toggleService() = viewModelScope.launch {
                  if (StepBoosterService.isRunning) {
                      StepBoosterService.stop(ctx)
                      AppDataStore.setServiceEnabled(ctx, false)
                  } else {
                      StepBoosterService.start(ctx)
                      AppDataStore.setServiceEnabled(ctx, true)
                  }
              }

              fun setMultiplier(v: Float) {
                  val r = Math.round(v * 2) / 2.0f
                  _state.value = _state.value.copy(multiplier = r)
                  viewModelScope.launch {
                      AppDataStore.setMultiplier(ctx, r)
                      StepBoosterService.currentMultiplier = r
                      notifyService()
                  }
              }

              fun setSimMode(mode: String) {
                  _state.value = _state.value.copy(simMode = mode)
                  viewModelScope.launch {
                      AppDataStore.setSimMode(ctx, mode)
                      StepBoosterService.currentMode = mode
                      notifyService()
                  }
              }

              fun setStepsPerMin(spm: Int) {
                  _state.value = _state.value.copy(stepsPerMin = spm)
                  viewModelScope.launch {
                      AppDataStore.setStepsPerMin(ctx, spm)
                      StepBoosterService.currentSPM = spm
                      notifyService()
                  }
              }

              fun setGpsSim(enabled: Boolean) {
                  _state.value = _state.value.copy(gpsSimEnabled = enabled)
                  viewModelScope.launch {
                      AppDataStore.setGpsSim(ctx, enabled)
                      StepBoosterService.gpsSimEnabled = enabled
                      notifyService()
                  }
              }

              fun onPermissionsGranted() = viewModelScope.launch {
                  _state.value = _state.value.copy(hasPermissions = hcMgr.hasPermissions())
              }

              private fun notifyService() {
                  if (StepBoosterService.isRunning) {
                      ctx.startService(
                          Intent(ctx, StepBoosterService::class.java).apply {
                              action = StepBoosterService.ACTION_UPDATE_CONFIG
                          }
                      )
                  }
              }
          }
          """)

