          package com.example.stepbooster

          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.flow.first
          import kotlinx.coroutines.launch

          class BootReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  if (intent.action == Intent.ACTION_BOOT_COMPLETED ||
                      intent.action == Intent.ACTION_MY_PACKAGE_REPLACED) {
                      CoroutineScope(Dispatchers.IO).launch {
                          if (AppDataStore.getServiceEnabled(context).first()) {
                              StepBoosterService.start(context)
                          }
                      }
                  }
              }
          }
          """)

          w("app/src/main/java/com/example/stepbooster/WatchdogAlarmReceiver.kt", """
          package com.example.stepbooster

          import android.app.AlarmManager
          import android.app.PendingIntent
          import android.content.BroadcastReceiver
          import android.content.Context
          import android.content.Intent
          import android.os.SystemClock
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.flow.first
          import kotlinx.coroutines.launch

          class WatchdogAlarmReceiver : BroadcastReceiver() {
              override fun onReceive(context: Context, intent: Intent) {
                  CoroutineScope(Dispatchers.IO).launch {
                      val enabled = AppDataStore.getServiceEnabled(context).first()
                      if (enabled && !StepBoosterService.isRunning) {
                          StepBoosterService.start(context)
                      }
                      if (enabled) {
                          val pi = PendingIntent.getBroadcast(
                              context,
                              0,
                              Intent(context, WatchdogAlarmReceiver::class.java),
                              PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                          )
                          (context.getSystemService(Context.ALARM_SERVICE) as AlarmManager)
                              .setExactAndAllowWhileIdle(
                                  AlarmManager.ELAPSED_REALTIME_WAKEUP,
                                  SystemClock.elapsedRealtime() + 5 * 60 * 1000L,
                                  pi
                              )
                      }
                  }
              }
          }
          """)

