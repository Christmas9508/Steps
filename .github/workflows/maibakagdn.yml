          package com.example.stepbooster

          import android.Manifest
          import android.content.Intent
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.provider.Settings
          import androidx.activity.ComponentActivity
          import androidx.activity.compose.setContent
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.activity.viewModels
          import androidx.compose.runtime.collectAsState
          import androidx.compose.runtime.getValue
          import androidx.health.connect.client.PermissionController
          import androidx.health.connect.client.permission.HealthPermission
          import androidx.health.connect.client.records.DistanceRecord
          import androidx.health.connect.client.records.StepsRecord
          import com.example.stepbooster.ui.MainScreen
          import com.example.stepbooster.ui.theme.StepBoosterTheme

          class MainActivity : ComponentActivity() {
              private val viewModel: MainViewModel by viewModels()

              private val hcPermLauncher = registerForActivityResult(
                  PermissionController.createRequestPermissionResultContract()
              ) {
                  viewModel.onPermissionsGranted()
              }

              private val locationLauncher = registerForActivityResult(
                  ActivityResultContracts.RequestMultiplePermissions()
              ) {
                  viewModel.onPermissionsGranted()
              }

              private val activityLauncher = registerForActivityResult(
                  ActivityResultContracts.RequestPermission()
              ) { _ ->
                  launchHCPermissions()
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContent {
                      StepBoosterTheme {
                          val state by viewModel.state.collectAsState()
                          MainScreen(
                              state = state,
                              onToggleService = { viewModel.toggleService() },
                              onMultiplierChange = { viewModel.setMultiplier(it) },
                              onSimModeChange = { viewModel.setSimMode(it) },
                              onStepsPerMinChange = { viewModel.setStepsPerMin(it) },
                              onGpsSimChange = { viewModel.setGpsSim(it) },
                              onRequestPermissions = { requestAllPermissions() },
                              onBatteryOptimization = { openBatterySettings() },
                              onOpenHCStore = { openPlayStore("com.google.android.apps.healthdata") },
                              onOpenDevOptions = { openDevOptions() }
                          )
                      }
                  }
              }

              private fun requestAllPermissions() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      activityLauncher.launch(Manifest.permission.ACTIVITY_RECOGNITION)
                  } else {
                      launchHCPermissions()
                  }
              }

              private fun launchHCPermissions() {
                  hcPermLauncher.launch(
                      setOf(
                          HealthPermission.getReadPermission(StepsRecord::class),
                          HealthPermission.getWritePermission(StepsRecord::class),
                          HealthPermission.getReadPermission(DistanceRecord::class),
                          HealthPermission.getWritePermission(DistanceRecord::class)
                      )
                  )

                  locationLauncher.launch(
                      arrayOf(
                          Manifest.permission.ACCESS_FINE_LOCATION,
                          Manifest.permission.ACCESS_COARSE_LOCATION
                      )
                  )
              }

              private fun openBatterySettings() {
                  try {
                      startActivity(
                          Intent(Settings.ACTION_REQUEST_IGNORE_BATTERY_OPTIMIZATIONS).apply {
                              data = Uri.parse("package:$packageName")
                          }
                      )
                  } catch (e: Exception) {
                      startActivity(Intent(Settings.ACTION_IGNORE_BATTERY_OPTIMIZATION_SETTINGS))
                  }
              }

              private fun openDevOptions() {
                  try {
                      startActivity(Intent(Settings.ACTION_APPLICATION_DEVELOPMENT_SETTINGS))
                  } catch (_: Exception) {}
              }

              private fun openPlayStore(pkg: String) {
                  try {
                      startActivity(Intent(Intent.ACTION_VIEW, Uri.parse("market://details?id=$pkg")))
                  } catch (e: Exception) {
                      startActivity(
                          Intent(
                              Intent.ACTION_VIEW,
                              Uri.parse("https://play.google.com/store/apps/details?id=$pkg")
                          )
                      )
                  }
              }
          }
          """)

