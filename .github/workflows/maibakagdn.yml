          # ── AppDataStore ────────────────────────────────────────────────────

          w("app/src/main/java/com/example/stepbooster/AppDataStore.kt", """
          package com.example.stepbooster

          import android.content.Context
          import androidx.datastore.core.DataStore
          import androidx.datastore.preferences.core.Preferences
          import androidx.datastore.preferences.core.booleanPreferencesKey
          import androidx.datastore.preferences.core.edit
          import androidx.datastore.preferences.core.floatPreferencesKey
          import androidx.datastore.preferences.core.intPreferencesKey
          import androidx.datastore.preferences.core.stringPreferencesKey
          import androidx.datastore.preferences.preferencesDataStore
          import kotlinx.coroutines.flow.Flow
          import kotlinx.coroutines.flow.map

          val Context.dataStore: DataStore<Preferences> by preferencesDataStore(name = "stepbooster_prefs")

          object AppDataStore {
              private val MULTIPLIER_KEY = floatPreferencesKey("multiplier")
              private val SERVICE_ENABLED_KEY = booleanPreferencesKey("service_enabled")
              private val SIM_MODE_KEY = stringPreferencesKey("sim_mode")
              private val STEPS_PER_MIN_KEY = intPreferencesKey("steps_per_min")
              private val GPS_SIM_KEY = booleanPreferencesKey("gps_sim")
              private val CENTER_LAT_KEY = floatPreferencesKey("center_lat")
              private val CENTER_LNG_KEY = floatPreferencesKey("center_lng")

              fun getMultiplier(ctx: Context): Flow<Float> = ctx.dataStore.data.map { it[MULTIPLIER_KEY] ?: 2.0f }
              fun getServiceEnabled(ctx: Context): Flow<Boolean> = ctx.dataStore.data.map { it[SERVICE_ENABLED_KEY] ?: false }
              fun getSimMode(ctx: Context): Flow<String> = ctx.dataStore.data.map { it[SIM_MODE_KEY] ?: "SENSOR" }
              fun getStepsPerMin(ctx: Context): Flow<Int> = ctx.dataStore.data.map { it[STEPS_PER_MIN_KEY] ?: 90 }
              fun getGpsSim(ctx: Context): Flow<Boolean> = ctx.dataStore.data.map { it[GPS_SIM_KEY] ?: false }
              fun getCenterLat(ctx: Context): Flow<Float> = ctx.dataStore.data.map { it[CENTER_LAT_KEY] ?: 44.4268f }
              fun getCenterLng(ctx: Context): Flow<Float> = ctx.dataStore.data.map { it[CENTER_LNG_KEY] ?: 26.1025f }

              suspend fun setMultiplier(ctx: Context, v: Float) = ctx.dataStore.edit { it[MULTIPLIER_KEY] = v }
              suspend fun setServiceEnabled(ctx: Context, v: Boolean) = ctx.dataStore.edit { it[SERVICE_ENABLED_KEY] = v }
              suspend fun setSimMode(ctx: Context, v: String) = ctx.dataStore.edit { it[SIM_MODE_KEY] = v }
              suspend fun setStepsPerMin(ctx: Context, v: Int) = ctx.dataStore.edit { it[STEPS_PER_MIN_KEY] = v }
              suspend fun setGpsSim(ctx: Context, v: Boolean) = ctx.dataStore.edit { it[GPS_SIM_KEY] = v }
              suspend fun setCenterLat(ctx: Context, v: Float) = ctx.dataStore.edit { it[CENTER_LAT_KEY] = v }
              suspend fun setCenterLng(ctx: Context, v: Float) = ctx.dataStore.edit { it[CENTER_LNG_KEY] = v }
          }
          """)

          # ── HealthConnectManager ────────────────────────────────────────────

          w("app/src/main/java/com/example/stepbooster/HealthConnectManager.kt", """
          package com.example.stepbooster

          import android.content.Context
          import androidx.health.connect.client.HealthConnectClient
          import androidx.health.connect.client.permission.HealthPermission
          import androidx.health.connect.client.records.DistanceRecord
          import androidx.health.connect.client.records.StepsRecord
          import androidx.health.connect.client.request.ReadRecordsRequest
          import androidx.health.connect.client.time.TimeRangeFilter
          import androidx.health.connect.client.units.Length
          import java.time.Instant
          import java.time.LocalDate
          import java.time.ZoneId

          class HealthConnectManager(private val context: Context) {

              private val client by lazy { HealthConnectClient.getOrCreate(context) }

              val permissions = setOf(
                  HealthPermission.getReadPermission(StepsRecord::class),
                  HealthPermission.getWritePermission(StepsRecord::class),
                  HealthPermission.getReadPermission(DistanceRecord::class),
                  HealthPermission.getWritePermission(DistanceRecord::class)
              )

              fun isAvailable(): Boolean {
                  return try {
                      HealthConnectClient.getOrCreate(context)
                      true
                  } catch (e: Exception) {
                      false
                  }
              }

              suspend fun hasPermissions(): Boolean {
                  return try {
                      client.permissionController.getGrantedPermissions().containsAll(permissions)
                  } catch (e: Exception) {
                      false
                  }
              }

              suspend fun writeSteps(steps: Long, startTime: Instant, endTime: Instant) {
                  if (steps <= 0) return
                  try {
                      val safeEnd = if (endTime.isAfter(startTime)) endTime else startTime.plusMillis(1000)
                      client.insertRecords(
                          listOf(
                              StepsRecord(
                                  count = steps,
                                  startTime = startTime,
                                  endTime = safeEnd,
                                  startZoneOffset = ZoneId.systemDefault().rules.getOffset(startTime),
                                  endZoneOffset = ZoneId.systemDefault().rules.getOffset(safeEnd)
                              )
                          )
                      )
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              suspend fun writeDistance(meters: Double, startTime: Instant, endTime: Instant) {
                  if (meters <= 0.0) return
                  try {
                      val safeEnd = if (endTime.isAfter(startTime)) endTime else startTime.plusMillis(1000)
                      client.insertRecords(
                          listOf(
                              DistanceRecord(
                                  distance = Length.meters(meters),
                                  startTime = startTime,
                                  endTime = safeEnd,
                                  startZoneOffset = ZoneId.systemDefault().rules.getOffset(startTime),
                                  endZoneOffset = ZoneId.systemDefault().rules.getOffset(safeEnd)
                              )
                          )
                      )
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              suspend fun readTodaySteps(): Long {
                  return try {
                      val startOfDay = LocalDate.now().atStartOfDay(ZoneId.systemDefault()).toInstant()
                      client.readRecords(
                          ReadRecordsRequest(
                              recordType = StepsRecord::class,
                              timeRangeFilter = TimeRangeFilter.between(startOfDay, Instant.now())
                          )
                      ).records.sumOf { it.count }
                  } catch (e: Exception) {
                      0L
                  }
              }
          }
          """)

          # ── LocationSimulator ───────────────────────────────────────────────

          w("app/src/main/java/com/example/stepbooster/LocationSimulator.kt", """
          package com.example.stepbooster

          import android.content.Context
          import android.location.Location
          import android.location.LocationManager
          import android.os.SystemClock
          import kotlin.math.PI
          import kotlin.math.cos
          import kotlin.math.sin

          class LocationSimulator(private val context: Context) {

              companion object {
                  const val PROVIDER = LocationManager.GPS_PROVIDER
                  const val WALK_SPEED_MPS = 1.4f
                  const val ROUTE_RADIUS_M = 300.0
                  const val UPDATE_INTERVAL_MS = 2000L
              }

              private val lm by lazy { context.getSystemService(Context.LOCATION_SERVICE) as LocationManager }
              private var angle = 0.0
              private var centerLat = 44.4268
              private var centerLng = 26.1025

              fun setup(lat: Double, lng: Double) {
                  centerLat = lat
                  centerLng = lng
                  try {
                      try {
                          lm.removeTestProvider(PROVIDER)
                      } catch (_: Exception) {}
                      lm.addTestProvider(PROVIDER, false, false, false, false, true, true, true, 0, 5)
                      lm.setTestProviderEnabled(PROVIDER, true)
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              fun nextLocation(): Location {
                  val deltaAngle = (WALK_SPEED_MPS * UPDATE_INTERVAL_MS / 1000.0) / ROUTE_RADIUS_M
                  angle = (angle + deltaAngle) % (2 * PI)

                  val dLat = ROUTE_RADIUS_M / 111_000.0
                  val dLng = ROUTE_RADIUS_M / (111_000.0 * cos(Math.toRadians(centerLat)))

                  val lat = centerLat + dLat * sin(angle)
                  val lng = centerLng + dLng * cos(angle)

                  return Location(PROVIDER).apply {
                      latitude = lat
                      longitude = lng
                      altitude = 80.0
                      accuracy = 3.0f
                      speed = WALK_SPEED_MPS
                      bearing = Math.toDegrees(angle + PI / 2).toFloat()
                      time = System.currentTimeMillis()
                      elapsedRealtimeNanos = SystemClock.elapsedRealtimeNanos()
                  }
              }

              fun push(loc: Location) {
                  try {
                      lm.setTestProviderLocation(PROVIDER, loc)
                  } catch (_: Exception) {}
              }

              fun stop() {
                  try {
                      lm.setTestProviderEnabled(PROVIDER, false)
                  } catch (_: Exception) {}
                  try {
                      lm.removeTestProvider(PROVIDER)
                  } catch (_: Exception) {}
              }
          }
          """)

          # ── StepBoosterService ──────────────────────────────────────────────

          w("app/src/main/java/com/example/stepbooster/StepBoosterService.kt", """
          package com.example.stepbooster

          import android.app.AlarmManager
          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.PendingIntent
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.hardware.Sensor
          import android.hardware.SensorEvent
          import android.hardware.SensorEventListener
          import android.hardware.SensorManager
          import android.os.IBinder
          import android.os.PowerManager
          import android.os.SystemClock
          import androidx.core.app.NotificationCompat
          import kotlinx.coroutines.CoroutineScope
          import kotlinx.coroutines.Dispatchers
          import kotlinx.coroutines.Job
          import kotlinx.coroutines.SupervisorJob
          import kotlinx.coroutines.cancel
          import kotlinx.coroutines.delay
          import kotlinx.coroutines.flow.first
          import kotlinx.coroutines.launch
          import java.time.Instant

          class StepBoosterService : Service(), SensorEventListener {

              companion object {
                  const val CHANNEL_ID = "stepbooster_channel"
                  const val NOTIFICATION_ID = 1001
                  const val ACTION_UPDATE_CONFIG = "ACTION_UPDATE_CONFIG"

                  var realStepsToday = 0L
                  var simStepsToday = 0L
                  var boostedStepsToday = 0L
                  var currentMultiplier = 2.0f
                  var currentMode = "SENSOR"
                  var currentSPM = 90
                  var gpsSimEnabled = false
                  var isRunning = false

                  fun start(ctx: Context) = ctx.startForegroundService(Intent(ctx, StepBoosterService::class.java))
                  fun stop(ctx: Context) = ctx.stopService(Intent(ctx, StepBoosterService::class.java))
              }

              private lateinit var sensorManager: SensorManager
              private lateinit var wakeLock: PowerManager.WakeLock
              private lateinit var hcManager: HealthConnectManager
              private lateinit var locationSim: LocationSimulator
              private val scope = CoroutineScope(SupervisorJob() + Dispatchers.IO)

              private var batchReal = 0L
              private var batchStart: Instant? = null
              private var batchEnd: Instant? = null
              private var batchJob: Job? = null

              private var simJob: Job? = null
              private var gpsJob: Job? = null

              override fun onCreate() {
                  super.onCreate()
                  isRunning = true
                  hcManager = HealthConnectManager(this)
                  locationSim = LocationSimulator(this)
                  sensorManager = getSystemService(SENSOR_SERVICE) as SensorManager

                  val pm = getSystemService(POWER_SERVICE) as PowerManager
                  wakeLock = pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK, "StepBooster::WakeLock")
                  wakeLock.acquire(10 * 60 * 1000L)

                  scope.launch {
                      currentMultiplier = AppDataStore.getMultiplier(applicationContext).first()
                      currentMode = AppDataStore.getSimMode(applicationContext).first()
                      currentSPM = AppDataStore.getStepsPerMin(applicationContext).first()
                      gpsSimEnabled = AppDataStore.getGpsSim(applicationContext).first()
                      val lat = AppDataStore.getCenterLat(applicationContext).first().toDouble()
                      val lng = AppDataStore.getCenterLng(applicationContext).first().toDouble()

                      if (gpsSimEnabled) startGpsSim(lat, lng)
                      if (currentMode != "SENSOR") startSimulation()
                      if (currentMode != "SIMULATE") registerSensor()
                      updateNotification()
                  }

                  createNotificationChannel()
                  startForeground(NOTIFICATION_ID, buildNotification())
                  scheduleWatchdog()
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (intent?.action == ACTION_UPDATE_CONFIG) {
                      scope.launch { reloadConfig() }
                  }
                  return START_STICKY
              }

              private suspend fun reloadConfig() {
                  val newMode = AppDataStore.getSimMode(applicationContext).first()
                  val newSPM = AppDataStore.getStepsPerMin(applicationContext).first()
                  val newMult = AppDataStore.getMultiplier(applicationContext).first()
                  val newGps = AppDataStore.getGpsSim(applicationContext).first()
                  val lat = AppDataStore.getCenterLat(applicationContext).first().toDouble()
                  val lng = AppDataStore.getCenterLng(applicationContext).first().toDouble()

                  currentMultiplier = newMult
                  currentSPM = newSPM

                  if (newMode != currentMode) {
                      currentMode = newMode
                      simJob?.cancel()
                      sensorManager.unregisterListener(this)
                      if (currentMode != "SIMULATE") registerSensor()
                      if (currentMode != "SENSOR") startSimulation()
                  }

                  if (newGps != gpsSimEnabled) {
                      gpsSimEnabled = newGps
                      if (gpsSimEnabled) startGpsSim(lat, lng)
                      else {
                          gpsJob?.cancel()
                          locationSim.stop()
                      }
                  }

                  updateNotification()
              }

              private fun registerSensor() {
                  sensorManager.getDefaultSensor(Sensor.TYPE_STEP_DETECTOR)?.let {
                      sensorManager.registerListener(this, it, SensorManager.SENSOR_DELAY_NORMAL)
                  }
              }

              override fun onSensorChanged(event: SensorEvent) {
                  if (event.sensor.type == Sensor.TYPE_STEP_DETECTOR) {
                      val now = Instant.now()
                      synchronized(this) {
                          batchReal++
                          realStepsToday++
                          if (batchStart == null) batchStart = now
                          batchEnd = now
                      }
                      if (batchJob?.isActive != true) {
                          batchJob = scope.launch {
                              delay(15_000L)
                              flushReal()
                          }
                      }
                      updateNotification()
                  }
              }

              override fun onAccuracyChanged(sensor: Sensor?, accuracy: Int) = Unit

              private suspend fun flushReal() {
                  val steps: Long
                  val s: Instant
                  val e: Instant
                  synchronized(this) {
                      if (batchReal == 0L) return
                      steps = batchReal
                      s = batchStart ?: Instant.now()
                      e = batchEnd ?: Instant.now()
                      batchReal = 0L
                      batchStart = null
                      batchEnd = null
                  }

                  val boosted = Math.round(steps.toDouble() * currentMultiplier.toDouble())
                  boostedStepsToday += boosted
                  hcManager.writeSteps(boosted, s, e)
                  hcManager.writeDistance(boosted * 0.75, s, e)
                  updateNotification()
              }

              private fun startSimulation() {
                  simJob?.cancel()
                  simJob = scope.launch {
                      while (true) {
                          val windowStart = Instant.now().minusSeconds(60)
                          val now = Instant.now()
                          val simulatedSteps = currentSPM.toLong()

                          simStepsToday += simulatedSteps
                          val boosted = Math.round(simulatedSteps.toDouble() * currentMultiplier.toDouble())
                          boostedStepsToday += boosted

                          hcManager.writeSteps(boosted, windowStart, now)
                          hcManager.writeDistance(boosted * 0.75, windowStart, now)

                          updateNotification()
                          delay(60_000L)
                      }
                  }
              }

              private fun startGpsSim(lat: Double, lng: Double) {
                  locationSim.setup(lat, lng)
                  gpsJob?.cancel()
                  gpsJob = scope.launch {
                      while (true) {
                          val loc = locationSim.nextLocation()
                          locationSim.push(loc)
                          delay(LocationSimulator.UPDATE_INTERVAL_MS)
                      }
                  }
              }

              override fun onTaskRemoved(rootIntent: Intent?) {
                  super.onTaskRemoved(rootIntent)
                  val pi = PendingIntent.getService(
                      this,
                      1,
                      Intent(applicationContext, StepBoosterService::class.java),
                      PendingIntent.FLAG_ONE_SHOT or PendingIntent.FLAG_IMMUTABLE
                  )
                  (getSystemService(ALARM_SERVICE) as AlarmManager).set(
                      AlarmManager.ELAPSED_REALTIME,
                      SystemClock.elapsedRealtime() + 2000,
                      pi
                  )
              }

              override fun onDestroy() {
                  super.onDestroy()
                  isRunning = false
                  sensorManager.unregisterListener(this)
                  simJob?.cancel()
                  gpsJob?.cancel()
                  locationSim.stop()
                  scope.cancel()
                  if (wakeLock.isHeld) wakeLock.release()
              }

              override fun onBind(intent: Intent?): IBinder? = null

              private fun createNotificationChannel() {
                  val ch = NotificationChannel(
                      CHANNEL_ID,
                      getString(R.string.notification_channel_name),
                      NotificationManager.IMPORTANCE_LOW
                  )
                  ch.setShowBadge(false)
                  (getSystemService(NOTIFICATION_SERVICE) as NotificationManager)
                      .createNotificationChannel(ch)
              }

              private fun buildNotification(): Notification {
                  val pi = PendingIntent.getActivity(
                      this,
                      0,
                      Intent(this, MainActivity::class.java),
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  return NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("StepBooster ${currentMultiplier}x | ${currentMode}")
                      .setContentText("Reali: $realStepsToday | Sim: $simStepsToday | HC: $boostedStepsToday")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .setContentIntent(pi)
                      .setOngoing(true)
                      .setSilent(true)
                      .build()
              }

              private fun updateNotification() {
                  (getSystemService(NOTIFICATION_SERVICE) as NotificationManager)
                      .notify(NOTIFICATION_ID, buildNotification())
              }

              private fun scheduleWatchdog() {
                  val pi = PendingIntent.getBroadcast(
                      this,
                      0,
                      Intent(this, WatchdogAlarmReceiver::class.java),
                      PendingIntent.FLAG_UPDATE_CURRENT or PendingIntent.FLAG_IMMUTABLE
                  )
                  (getSystemService(ALARM_SERVICE) as AlarmManager).setExactAndAllowWhileIdle(
                      AlarmManager.ELAPSED_REALTIME_WAKEUP,
                      SystemClock.elapsedRealtime() + 5 * 60 * 1000L,
                      pi
                  )
              }
          }
          """)

