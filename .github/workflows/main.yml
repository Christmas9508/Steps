name: Build StepBooster APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Creaza structura proiect
        run: |
          mkdir -p app/src/main/java/com/example/stepbooster/ui/theme
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          mkdir -p gradle/wrapper

          for f in MainActivity.kt MainViewModel.kt StepBoosterService.kt HealthConnectManager.kt MultiplierDataStore.kt BootReceiver.kt WatchdogAlarmReceiver.kt; do
            [ -f "$f" ] && mv "$f" app/src/main/java/com/example/stepbooster/
          done
          [ -f "MainScreen.kt" ] && mv MainScreen.kt app/src/main/java/com/example/stepbooster/ui/
          [ -f "Theme.kt" ] && mv Theme.kt app/src/main/java/com/example/stepbooster/ui/theme/
          [ -f "AndroidManifest.xml" ] && mv AndroidManifest.xml app/src/main/
          [ -f "strings.xml" ] && mv strings.xml app/src/main/res/values/
          [ -f "themes.xml" ] && mv themes.xml app/src/main/res/values/
          [ -f "gradle-wrapper.properties" ] && mv gradle-wrapper.properties gradle/wrapper/
          [ -f "libs.versions.toml" ] && mv libs.versions.toml gradle/
          [ -f "proguard-rules.pro" ] && mv proguard-rules.pro app/

          cat > settings.gradle.kts << 'SEOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "StepBooster"
          include(":app")
          SEOF

          cat > build.gradle.kts << 'BEOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "2.0.21" apply false
              id("org.jetbrains.kotlin.plugin.compose") version "2.0.21" apply false
          }
          BEOF

          cat > app/build.gradle.kts << 'ABEOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
              id("org.jetbrains.kotlin.plugin.compose")
          }
          android {
              namespace = "com.example.stepbooster"
              compileSdk = 34
              defaultConfig {
                  applicationId = "com.example.stepbooster"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_11
                  targetCompatibility = JavaVersion.VERSION_11
              }
              kotlinOptions { jvmTarget = "11" }
              buildFeatures { compose = true }
          }
          dependencies {
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.6")
              implementation("androidx.lifecycle:lifecycle-viewmodel-compose:2.8.6")
              implementation("androidx.activity:activity-compose:1.9.3")
              implementation(platform("androidx.compose:compose-bom:2024.10.01"))
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-graphics")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.material3:material3")
              implementation("androidx.compose.material:material-icons-extended")
              implementation("androidx.health.connect:connect-client:1.0.0-alpha11")
              implementation("androidx.datastore:datastore-preferences:1.1.1")
              implementation("androidx.work:work-runtime-ktx:2.9.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.9.0")
              debugImplementation("androidx.compose.ui:ui-tooling")
          }
          ABEOF

      - name: Genereaza iconite launcher
        run: |
          python3 << 'PYEOF'
          import struct, zlib

          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              sig = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', size, size, 8, 2, 0, 0, 0))
              raw = b''
              for y in range(size):
                  row = b'\x00'
                  for x in range(size):
                      cx, cy = x - size//2, y - size//2
                      if cx*cx + cy*cy <= (size//2 - 2)**2:
                          row += bytes([r, g, b])
                      else:
                          row += b'\x00\x00\x00'
                  raw += row
              idat = chunk(b'IDAT', zlib.compress(raw))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192
          }
          for folder, size in sizes.items():
              path = f'app/src/main/res/{folder}'
              png = make_png(size, 46, 125, 50)
              with open(f'{path}/ic_launcher.png', 'wb') as f:
                  f.write(png)
              with open(f'{path}/ic_launcher_round.png', 'wb') as f:
                  f.write(png)
          print('Iconite generate OK')
          PYEOF

      - name: Descarca Gradle Wrapper JAR
        run: |
          curl -L --retry 3 \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: yes | sdkmanager --licenses || true

      - run: ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: StepBooster-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
