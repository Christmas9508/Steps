          @Composable
          fun StatBox(label: String, value: String, icon: ImageVector, color: Color) {
              Column(
                  horizontalAlignment = Alignment.CenterHorizontally,
                  verticalArrangement = Arrangement.spacedBy(4.dp)
              ) {
                  Icon(icon, contentDescription = null, tint = color, modifier = Modifier.size(28.dp))
                  Text(value, fontWeight = FontWeight.Bold, fontSize = 20.sp, color = color)
                  Text(label, fontSize = 11.sp, color = Color.Gray, textAlign = TextAlign.Center)
              }
          }
          """)

          def make_png(size, r, g, b):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack(">I", len(data)) + name + data + struct.pack(">I", c)

              sig = b"\\x89PNG\\r\\n\\x1a\\n"
              ihdr = chunk(b"IHDR", struct.pack(">IIBBBBB", size, size, 8, 2, 0, 0, 0))
              raw = b""
              for y in range(size):
                  row = b"\\x00"
                  for x in range(size):
                      cx, cy = x - size // 2, y - size // 2
                      if cx * cx + cy * cy <= (size // 2 - 2) ** 2:
                          row += bytes([r, g, b])
                      else:
                          row += b"\\x00\\x00\\x00"
                  raw += row
              idat = chunk(b"IDAT", zlib.compress(raw))
              iend = chunk(b"IEND", b"")
              return sig + ihdr + idat + iend

          for folder, size in [
              ("mipmap-mdpi", 48),
              ("mipmap-hdpi", 72),
              ("mipmap-xhdpi", 96),
              ("mipmap-xxhdpi", 144),
              ("mipmap-xxxhdpi", 192),
          ]:
              path = f"app/src/main/res/{folder}"
              os.makedirs(path, exist_ok=True)
              png = make_png(size, 46, 125, 50)
              with open(f"{path}/ic_launcher.png", "wb") as f:
                  f.write(png)
              with open(f"{path}/ic_launcher_round.png", "wb") as f:
                  f.write(png)

          print("Toate fisierele au fost generate cu succes.")
          PYEOF

      - name: Descarcă Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L --retry 3 \
            "https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Acceptă licențele Android
        run: yes | sdkmanager --licenses || true

      - name: Instalează platforme Android necesare
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Build APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StepBooster-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
